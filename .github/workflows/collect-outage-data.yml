name: Collect outage and forecast data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run outage collection
        run: node scripts/fetch-outages.js

      - name: Fetch county forecast intelligence
        run: node scripts/fetch-county-weather-forecast.js

      - name: Merge county forecast into outage data
        run: node scripts/apply-county-weather-forecast.js

      - name: Build training rows
        run: node scripts/training_rows.js

      - name: Commit outage and forecast outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update TXDRMAP outage and forecast data"
          file_pattern: outages.json history/outage-history.json history/county-weather-forecast.json history/training-data.json
