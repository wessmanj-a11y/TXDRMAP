name: Collect outage data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run outage collection
        run: node scripts/fetch-outages.js

      - name: Commit outage outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update TXDRMAP outage data"
          file_pattern: outages.json history/outage-history.json
