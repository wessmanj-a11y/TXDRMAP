name: Collect outage forecast and ML data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: txdrmap-data-pipeline
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch SPC outlook intelligence
        run: node scripts/fetch-spc.js

      - name: Fetch FEMA county risk intelligence
        run: node scripts/fetch-fema-risk.js

      - name: Run outage collection
        run: node scripts/fetch-outages.js

      - name: Apply FEMA county risk intelligence
        run: node scripts/apply-fema-risk.js

      - name: Fetch county forecast intelligence
        run: node scripts/fetch-county-weather-forecast.js

      - name: Merge county forecast into outage data
        run: node scripts/apply-county-weather-forecast.js

      - name: Merge SPC outlook into outage data
        run: node scripts/apply-spc-outlook.js

      - name: Build training rows
        run: node scripts/training_rows.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Train ML risk model
        run: python scripts/ml_train_spc.py

      - name: Score ML risk
        run: python scripts/ml_score_spc.py

      - name: Commit outage forecast and ML outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outages.json \
            history/outage-history.json \
            history/county-weather-forecast.json \
            history/spc-outlook.json \
            history/fema-county-risk.json \
            history/training-data.json \
            history/ml-risk-metadata.json \
            history/ml-risk-model.joblib \
            history/ml-accuracy-history.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update TXDRMAP outage forecast and ML data"
          git pull --rebase origin main
          git push origin main
